name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# bromesh loads untrusted asset files — glTF/GLB, FBX, STL, OBJ, VOX — and does
# a lot of hand-indexed vertex/index buffer work on top of them. Header-supplied
# counts and offsets driving buffer indexing is exactly where an out-of-bounds
# read hides, so that is where the analysis pays off.
jobs:
  analyze:
    name: Analyze C++
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v7
        with:
          path: bromesh
          submodules: recursive

      - uses: actions/checkout@v7
        with:
          repository: wlejon/bromath
          path: bromath

      # Debug / -O0 keeps the extracted IR close to the source so dataflow paths
      # in the results point at code a human can act on. Default generator, not
      # Ninja — see the note in ci.yml (osqp/QDLDL trips Ninja).
      - name: Configure
        run: cmake -S bromesh -B build -DCMAKE_BUILD_TYPE=Debug

      # The seven vendored submodules (and the thin static wrappers bromesh puts
      # around them) are compiled here, ahead of `init`. For a compiled language
      # CodeQL only extracts what it observes the compiler build while tracing,
      # so anything already built when `init` runs is never analysed. That is the
      # exclusion mechanism — paths-ignore does not filter compiled sources — and
      # it keeps meshoptimizer/manifold/osqp/v-hacd/xatlas/OpenFBX/tinygltf
      # findings out of bromesh's Security tab, where they do not belong (each is
      # upstream with its own maintainers). bromath needs no entry: header-only,
      # no TUs of its own, so its headers are analysed where bromesh includes
      # them.
      - name: Pre-build vendored code (outside the traced build)
        run: |
          cmake --build build --parallel 4 --target \
            meshoptimizer par_shapes tinygltf vhacd xatlas manifold_lib openfbx osqpstatic

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended
          # Relative to the workspace root; this repo is checked out into
          # bromesh/ (not the root) so the sibling bromath can sit beside it.
          # paths-ignore is the second line of defence, catching any finding that
          # originates in a vendored *header* pulled into a bromesh TU.
          config-file: bromesh/.github/codeql/codeql-config.yml

      # Only bromesh's own library TUs are left to compile, so only they are
      # traced. The test binary is not built here — CodeQL does not run it, and
      # the library is the surface worth analysing.
      - name: Build bromesh (traced)
        run: cmake --build build --parallel 4 --target bromesh

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:c-cpp
